# DataPilot — Docker Compose
#
# Quick start:
#   1. cp .env.docker .env
#   2. Edit .env — set DATAPILOT_SERVER_TOKEN
#      (or generate one: docker compose run --rm server --generate-token)
#   3. docker compose up --build
#   4. Open http://localhost:9100

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        - DATAPILOT_DISABLE_OAUTH=${DATAPILOT_DISABLE_OAUTH:-1}
        - DATAPILOT_DISABLE_BROWSER=${DATAPILOT_DISABLE_BROWSER:-1}
        - DATAPILOT_DISABLE_VALIDATION=${DATAPILOT_DISABLE_VALIDATION:-}
        - DATAPILOT_DISABLE_TEMPLATES=${DATAPILOT_DISABLE_TEMPLATES:-}
        - DATAPILOT_LITE_UI=${DATAPILOT_LITE_UI:-1}
    ports:
      - "${DATAPILOT_RPC_PORT:-9100}:9100"
    environment:
      - DATAPILOT_SERVER_TOKEN=${DATAPILOT_SERVER_TOKEN}
      - DATAPILOT_WEBUI_PASSWORD=${DATAPILOT_WEBUI_PASSWORD:-}
      - DATAPILOT_RPC_HOST=0.0.0.0
      - DATAPILOT_RPC_PORT=9100
      - DATAPILOT_HEALTH_PORT=9101
    volumes:
      - ${DATAPILOT_DATA_DIR:-~/.datapilot}:/home/datapilot/.datapilot
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'await fetch(\"http://localhost:9101/\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  viewer:
    build:
      context: .
      dockerfile: Dockerfile.viewer
    depends_on:
      - server
    ports:
      - "${VIEWER_PORT:-9101}:9101"
    environment:
      - VIEWER_HOST=0.0.0.0
      - VIEWER_PORT=9101
      - VIEWER_BASE_URL=${VIEWER_BASE_URL:-http://localhost:9101}
    volumes:
      - ${VIEWER_DATA_DIR:-viewer-data}:/data
    restart: unless-stopped
