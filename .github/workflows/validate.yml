name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation suite
        run: bun run validate:ci

  # DEV-22 unified-CLI parity: exercises the agent-facing `datapilot` wrapper
  # under its new default routing (unified binary) with a multi-entity flow,
  # and asserts the DATAPILOT_UNIFIED_CLI=0 escape hatch still falls back to
  # the legacy craft-cli.
  unified-cli-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unified-CLI parity test (default routing + legacy escape hatch)
        run: bun test apps/cli/src/datapilot/parity.test.ts
