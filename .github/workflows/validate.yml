name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run validation suite
        run: bun run validate:ci

  # DEV-21 shadow-runtime parity: exercises the unified `datapilot` binary via
  # the agent-facing wrapper with DATAPILOT_UNIFIED_CLI=1. Fails if the unified
  # CLI regresses before Phase 5 flips the default.
  unified-cli-parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unified-CLI parity test (DATAPILOT_UNIFIED_CLI=1 multi-entity flow)
        env:
          DATAPILOT_UNIFIED_CLI: "1"
        run: bun test apps/cli/src/datapilot/parity.test.ts
